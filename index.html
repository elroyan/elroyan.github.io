    <!-- script -->
    <script src="vendors/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script
      src="https://cdn.rawgit.com/bungfrangki/efeksalju/2a7805c7/efek-salju.js"
      type="text/javascript"
    ></script>
    <script>
      // Fungsi untuk efek pengetikan
      function typeWriter(text, element, speed) {
        let i = 0;

        function type() {
          if (i < text.length) {
            element.innerHTML += text.charAt(i);
            i++;
            setTimeout(type, speed);
          } else {
            // Jeda sebelum menghapus teks
            setTimeout(() => {
              // Hapus teks saat ini
              element.innerHTML = "";
              i = 0;
              // Panggil kembali fungsi untuk mulai pengetikan ulang
              setTimeout(type, speed);
            }, 1000); // Jeda 1 detik sebelum menghapus
          }
        }

        // Memulai pengetikan pertama kali
        type();
      }

      // Ambil elemen span dengan id "typewriter-text"
      const typewriterSpan = document.getElementById("typewriter-text");

      // Teks yang akan ditampilkan dengan efek pengetikan
      const textToType = "click click this text";

      // Kecepatan efek pengetikan (ms)
      const typingSpeed = 100;

      // Panggil fungsi typeWriter
      typeWriter(textToType, typewriterSpan, typingSpeed);
    </script>
  </body>
